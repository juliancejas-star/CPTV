<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chocopop TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
}

#loader{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  z-index:999;
}

#app{
  display:none;
  height:100vh;
}

#sidebar{
  width:300px;
  overflow:auto;
  background:#111;
}

#main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

#container{
  display:flex;
  height:100%;
}

.channel{
  padding:10px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

.channel:hover{
  background:#222;
}

video{
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div id="loader">Cargando...</div>

<div id="app">
  <div id="container">
    <div id="sidebar"></div>
    <div id="main">
      <video id="video" controls autoplay></video>
    </div>
  </div>
</div>

<script>
const JSON_URL = "https://juliancejas-star.github.io/CPTV/canales.json";

let video = document.getElementById("video");
let sidebar = document.getElementById("sidebar");

async function init(){
  try{
    const res = await fetch(JSON_URL);
    const data = await res.json();

    render(data.channels);

    document.getElementById("loader").style.display = "none";
    document.getElementById("app").style.display = "block";

  }catch(e){
    document.getElementById("loader").innerHTML = "Error cargando canales";
    console.error(e);
  }
}

function render(channels){
  sidebar.innerHTML = "";

  Object.keys(channels).forEach(cat=>{
    let title = document.createElement("div");
    title.innerHTML = "<b>"+cat+"</b>";
    title.style.padding = "10px";
    sidebar.appendChild(title);

    channels[cat].forEach(ch=>{
      let div = document.createElement("div");
      div.className = "channel";
      div.innerText = ch.name;

      div.onclick = ()=> play(ch.url);

      sidebar.appendChild(div);
    });
  });
}

function play(url){
  if(Hls.isSupported()){
    let hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }else{
    video.src = url;
  }
}

init();
</script>

</body>
</html>
