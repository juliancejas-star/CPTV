<head>

<title>ChocoPop TV</title>

<style>
:root {
  --bg: #0d0f14;
  --surface: #13161e;
  --surface2: #1a1e2a;
  --border: #252a38;
  --accent: #6c63ff;
  --accent2: #a78bfa;
  --live: #ef4444;
  --text: #e8edf8;
  --muted: #5a6480;
  --hover: #1e2436;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;}

header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:54px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);}
.logo img{height:36px;object-fit:contain;}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--live);text-transform:uppercase;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:blink 1.3s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

main{display:flex;flex:1;overflow:hidden;}

#sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.search-wrap{padding:10px;border-bottom:1px solid var(--border);}
#search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;font-family:'Outfit',sans-serif;transition:border-color .2s;}
#search:focus{border-color:var(--accent);}
#search::placeholder{color:var(--muted);}
.cat-wrap{padding:8px 10px;border-bottom:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap;}
.cat-btn{padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .2s;font-family:'Outfit',sans-serif;}
.cat-btn:hover{color:var(--text);border-color:var(--accent);}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
#channel-list{overflow-y:auto;flex:1;}
#channel-list::-webkit-scrollbar{width:3px;}
#channel-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.ch-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid #0d1020;transition:background .15s;position:relative;}
.ch-item:hover{background:var(--hover);}
.ch-item.active{background:#1a1535;}
.ch-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 2px 2px 0;}
.ch-num{font-size:10px;color:var(--muted);min-width:18px;font-weight:500;}
.ch-icon{width:34px;height:34px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--accent2);flex-shrink:0;border:1px solid var(--border);text-align:center;line-height:1.2;padding:2px;}
.ch-name{font-size:12.5px;font-weight:500;color:var(--text);line-height:1.2;}
.ch-cat{font-size:10px;color:var(--muted);margin-top:1px;}

#content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#player-wrap{position:relative;background:#000;flex-shrink:0;}
#player{width:100%;aspect-ratio:16/9;max-height:calc(100vh - 54px - 80px - 26px);}

.jw-progress{background:var(--accent) !important;}
.jw-text-live::before{background:var(--live) !important;}
.jw-controlbar{background:rgba(13,15,20,.97) !important;border-top:1px solid var(--border) !important;}
.jw-button-color{color:#6a7a9a !important;}
.jw-button-color:hover{color:#fff !important;}
.jw-reset-text{color:#fff !important;}

#now-playing{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:none;align-items:center;gap:12px;min-height:60px;}
#np-icon{width:40px;height:40px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--accent2);border:1px solid var(--border);text-align:center;padding:2px;flex-shrink:0;}
#np-name{font-size:16px;font-weight:600;line-height:1;}
#np-sub{font-size:11px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:8px;}
.np-live-badge{display:inline-flex;align-items:center;gap:4px;color:var(--live);font-weight:600;font-size:10px;letter-spacing:.08em;text-transform:uppercase;}
.np-live-dot{width:5px;height:5px;border-radius:50%;background:var(--live);animation:blink 1.3s infinite;}

#status-bar{padding:4px 16px;font-size:11px;color:var(--muted);background:var(--bg);border-bottom:1px solid var(--border);min-height:24px;display:flex;align-items:center;gap:6px;}
.spin{display:inline-block;animation:spinr .7s linear infinite;}
@keyframes spinr{to{transform:rotate(360deg)}}

#empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:14px;}
#empty .big-logo{width:180px;opacity:.2;filter:grayscale(1);}
#empty p{font-size:14px;}

.ios-landscape{transform:rotate(90deg);transform-origin:center center;width:100vh !important;height:100vw !important;position:fixed !important;top:0;left:0;background:#000;z-index:9999;}

@media(max-width:600px){#sidebar{width:180px;}.cat-wrap{display:none;}}
@media(max-width:440px){
  main{flex-direction:column;}
  #sidebar{width:100%;height:130px;border-right:none;border-bottom:1px solid var(--border);}
  #channel-list{display:flex;flex-direction:row;overflow-x:auto;overflow-y:hidden;}
  .ch-item{flex-direction:column;min-width:64px;text-align:center;padding:7px 4px;border-bottom:none;border-right:1px solid #0d1020;}
  .ch-num,.ch-cat{display:none;}
  .search-wrap{display:none;}
}
</style>
</head>

  { b64:"Qm9vbWVyYW5n",           nombre:"Boomerang",            cat:"Infantil", n:7, k1:"5792e613fceb699c79cbc0e75fe4cd37", k2:"a672793730476ed23e5c1bce2ff570c6" },
  // Música
  { b64:"TVRWX0hE",               nombre:"MTV HD",               cat:"Música",   n:6, k1:"0c9eb3ead38a122ac460ad96a8ebfd2e", k2:"66bfbfa4449eb8bc1bcf7577d5bffaad" },
  { b64:"Q00=",                   nombre:"CM",                   cat:"Música",   n:6, k1:"682f36b5736f4560951ca14b80d29524", k2:"3accb729067a39b3b8143f1b447b9d25" },

];

var CATS = ["Todas","Deportes","Noticias","Abierta","HBO","Cine","Docs","Infantil","Música"];
var activeCat="Todas", activeSearch="", currentCh=null, playerInst=null;

function abbrev(n){ var w=n.split(" "); return w.length===1?n.substring(0,4).toUpperCase():w.slice(0,2).map(function(x){return x[0];}).join("").toUpperCase(); }

function renderCats(){
  var wrap=document.getElementById("cat-wrap"); wrap.innerHTML="";
  CATS.forEach(function(c){
    var b=document.createElement("button");
    b.className="cat-btn"+(c===activeCat?" active":"");
    b.textContent=c;
    b.onclick=function(){activeCat=c;renderCats();renderList();};
    wrap.appendChild(b);
  });
}

function renderList(){
  var list=document.getElementById("channel-list"); list.innerHTML="";
  var q=activeSearch.toLowerCase();
  var filtered=CANALES.filter(function(ch){
    return (activeCat==="Todas"||ch.cat===activeCat)&&(!q||ch.nombre.toLowerCase().includes(q));
  });
  filtered.forEach(function(ch,i){
    var el=document.createElement("div");
    el.className="ch-item"+(currentCh&&currentCh.b64===ch.b64?" active":"");
    el.innerHTML='<div class="ch-num">'+(i+1)+'</div><div class="ch-icon">'+abbrev(ch.nombre)+'</div><div><div class="ch-name">'+ch.nombre+'</div><div class="ch-cat">'+ch.cat+'</div></div>';
    el.onclick=function(){sintonizar(ch);};
    list.appendChild(el);
  });
}

document.getElementById("search").addEventListener("input",function(){activeSearch=this.value;renderList();});

function sintonizar(ch){
  currentCh=ch; renderList();
  document.getElementById("now-playing").style.display="flex";
  document.getElementById("np-icon").textContent=abbrev(ch.nombre);
  document.getElementById("np-name").textContent=ch.nombre;
  document.getElementById("empty").style.display="none";
  setStatus('<span class="spin">↻</span> Conectando con '+ch.nombre+'…');

  var host=rndHost();
  var canal=atob(ch.b64);
  var url="https://"+host+".cvattv.com.ar/live/c"+ch.n+"eds/"+canal+"/SA_Live_dash_enc_C/"+canal+".mpd";

  if(playerInst){try{playerInst.remove();}catch(e){}playerInst=null;}
  document.getElementById("player").innerHTML="";

  jwplayer("player").setup({
    playlist:[{
      title:ch.nombre, description:"EN VIVO",
      sources:[{ file:url, type:"dash", drm:{ clearkey:{ keyId:ch.k1, key:ch.k2 } } }]
    }],
    autostart:true, mute:false, volume:100,
    width:"100%", height:"100%", stretching:"exactfit", aspectratio:"16:9",
    preload:"auto", cast:{}, sharing:{},
  });

  playerInst=jwplayer("player");

  playerInst.on("play",function(){
    setStatus("▶ Reproduciendo · "+ch.nombre+" · "+host.toUpperCase());
    try{playerInst.setCurrentAudioTrack(1);}catch(e){}
  });

  playerInst.on("error",function(){
    var altHost=host==="cdn"?"chromecast":"cdn";
    var altUrl="https://"+altHost+".cvattv.com.ar/live/c"+ch.n+"eds/"+canal+"/SA_Live_dash_enc_C/"+canal+".mpd";
    setStatus('<span class="spin">↻</span> Reintentando…');
    try{
      playerInst.load([{sources:[{file:altUrl,type:"dash",drm:{clearkey:{keyId:ch.k1,key:ch.k2}}}]}]);
      playerInst.play();
    }catch(ex){ setStatus("✕ Error al cargar "+ch.nombre); }
  });

  playerInst.on("buffer",function(){ setStatus('<span class="spin">↻</span> Cargando…'); });

  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  playerInst.on("fullscreen",function(e){
    var c=document.getElementById("player");
    if(!isIOS&&screen.orientation){
      if(e.fullscreen){(async function t(){try{await screen.orientation.lock("landscape");}catch(err){setTimeout(t,200);}})();}
      else{try{screen.orientation.unlock();}catch(err){}}
    }
    if(isIOS){if(e.fullscreen)c.classList.add("ios-landscape");else c.classList.remove("ios-landscape");}
  });
}

function setStatus(html){ document.getElementById("status-bar").innerHTML=html; }

renderCats(); renderList();
</script>
